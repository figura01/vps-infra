services:

  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

    networks:
      - web


  portfolio:
    image: ghcr.io/figura01/portfolio:latest
    container_name: portfolio
    restart: unless-stopped

    env_file:
      - /srv/apps/portfolio/.env

    networks:
      - web


  test-projet-1:
    image: ghcr.io/figura01/test-projet-1:latest
    container_name: test-projet-1
    restart: unless-stopped

    env_file:
      - /srv/apps/test-projet-1/.env

    networks:
      - web


volumes:
  caddy_data:
  caddy_config:


networks:
  web:
